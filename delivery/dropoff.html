<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Piano Delivery — Signature Pianos</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e0d;
      color: #f5f0e8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>

<div id="pageContent">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;">
      <div style="font-size:20px;color:#b8935a;font-style:italic;margin-bottom:16px;">Signature Pianos</div>
      <div style="font-size:13px;color:#6b6760;">Loading…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
/* ============================================================================
   Signature Pianos — driver DROPOFF photo flow (public, token based)
   ----------------------------------------------------------------------------
   Sibling of pickup.html. Differences:
     * Loads via delivery_link_token
     * Already-confirmed check only short-circuits on 'delivered'
     * Photos uploaded under {deliveryId}/delivery/{ts}-{n}.jpg
     * POSTs to /api/driver-delivery-confirm (which generates warranty
       + auto-books tuner under service role)
     * Final state mentions warranty + tuner booking
   ============================================================================ */

// Vercel server rewrites do not expose the destination's query params to
// the browser (window.location.search stays empty for /delivery/drop/{token}),
// so the path segment is the reliable source. Fall back to ?token= in case
// the page is ever opened directly with the token as a query string.
const params = new URLSearchParams(window.location.search)
const token  = params.get('token') || window.location.pathname.split('/').pop()
if (!token || token === 'dropoff.html' || token === 'drop') {
  window.location.replace('/index.html')
}

let currentDelivery = null
let selectedPhotos = []
let deliveryStatusType = 'no_issues'

window.setDeliveryStatus = function (type) {
  deliveryStatusType = type
  const issueDetails = document.getElementById('issueDetails')
  const issueLabel   = document.getElementById('issueTypeLabel')
  if (!issueDetails || !issueLabel) return
  if (type === 'no_issues') {
    issueDetails.style.display = 'none'
  } else {
    issueDetails.style.display = 'block'
    issueLabel.textContent = type === 'damage'
      ? '⚠ Damage report — Eric will be notified immediately'
      : '✗ Failed delivery — Eric will be notified immediately'
  }
}

;(async function loadDeliveryPage() {
  try {
    const { data: delivery, error } = await _supabase
      .from('deliveries')
      .select(`
        *,
        order:order_id (
          *,
          customer:customer_id ( * ),
          piano:piano_id ( * )
        )
      `)
      .eq('delivery_link_token', token)
      .maybeSingle()

    if (error) throw error
    if (!delivery) return showError('This link is invalid or has expired.')

    if (delivery.status === 'delivered') {
      return showAlreadyConfirmed()
    }
    currentDelivery = delivery
    renderDeliveryPage(delivery)
  } catch (err) {
    console.error('[dropoff] load failed', err)
    showError('We could not load this delivery. Please try again or contact Signature Pianos.')
  }
})()

function esc(s) {
  if (s == null) return ''
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
}

function renderDeliveryPage(delivery) {
  const piano    = delivery.order?.piano    || {}
  const customer = delivery.order?.customer || {}
  const pianoLabel = `${piano.brand || 'Yamaha'} ${piano.model || ''} ${piano.year || ''}`.trim()

  const deliverTo = [
    customer.address_line1, customer.suburb, customer.state, customer.postcode,
  ].filter(Boolean).join(', ')

  document.getElementById('pageContent').innerHTML = `

    <div style="background:#1a1917;padding:20px 24px;position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(184,147,90,0.2);">
      <div style="font-size:16px;color:#b8935a;font-style:italic;">Signature Pianos</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;">Piano delivery — photo confirmation</div>
    </div>

    <div style="padding:24px;max-width:480px;margin:0 auto;">

      <div style="background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;padding:16px;margin-bottom:24px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#6b6760;margin-bottom:8px;">Piano being delivered</div>
        <div style="font-size:20px;font-family:'Cormorant Garamond',serif;color:#f5f0e8;font-style:italic;margin-bottom:4px;">${esc(pianoLabel)}</div>
        <div style="font-size:12px;color:#6b6760;">
          ${piano.serial_number ? 'Serial: ' + esc(piano.serial_number) : ''}
        </div>
        ${deliverTo ? `
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#6b6760;margin-top:14px;margin-bottom:4px;">Deliver to</div>
          <div style="font-size:13px;color:#9a9590;line-height:1.6;">${esc(deliverTo)}</div>
        ` : ''}
        ${customer.phone ? `
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#6b6760;margin-top:10px;margin-bottom:4px;">Customer phone</div>
          <a href="tel:${esc(customer.phone)}" style="font-size:13px;color:#b8935a;text-decoration:none;">${esc(customer.phone)}</a>
        ` : ''}
      </div>

      <div style="margin-bottom:24px;">
        <div style="font-size:14px;font-weight:500;color:#f5f0e8;margin-bottom:12px;">Once the piano is in place:</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${[
            'Place the piano in the agreed position',
            'Photograph the piano in its new home — all 4 sides',
            'Photograph it in context of the room',
            'Take at least 3 photos minimum',
            'Upload photos using the button below',
          ].map((step, i) => `
            <div style="display:flex;gap:12px;align-items:flex-start;">
              <div style="background:#b8935a;color:#000;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;margin-top:1px;">${i + 1}</div>
              <div style="font-size:14px;color:#9a9590;line-height:1.5;padding-top:3px;">${esc(step)}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div style="background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:4px;padding:14px;margin-bottom:24px;">
        <div style="font-size:13px;color:#e74c3c;font-weight:500;margin-bottom:4px;">Do not leave the property until photos are uploaded</div>
        <div style="font-size:12px;color:rgba(231,76,60,0.85);line-height:1.5;">These photos confirm successful delivery and trigger the customer's warranty.</div>
      </div>

      <div style="margin-bottom:20px;">
        <div style="font-size:14px;font-weight:500;color:#f5f0e8;margin-bottom:12px;">Delivery status</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="display:flex;align-items:center;gap:10px;padding:14px;background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;cursor:pointer;">
            <input type="radio" name="deliveryStatus" value="no_issues" checked onchange="setDeliveryStatus('no_issues')" style="accent-color:#b8935a;flex-shrink:0;">
            <div>
              <div style="font-size:14px;color:#f5f0e8;font-weight:500;">✓ Delivered successfully</div>
              <div style="font-size:12px;color:#9a9590;margin-top:2px;">No issues — piano placed in position</div>
            </div>
          </label>
          <label style="display:flex;align-items:center;gap:10px;padding:14px;background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;cursor:pointer;">
            <input type="radio" name="deliveryStatus" value="damage" onchange="setDeliveryStatus('damage')" style="accent-color:#e74c3c;flex-shrink:0;">
            <div>
              <div style="font-size:14px;color:#f5f0e8;font-weight:500;">⚠ Damage to report</div>
              <div style="font-size:12px;color:#9a9590;margin-top:2px;">Piano was damaged during delivery</div>
            </div>
          </label>
          <label style="display:flex;align-items:center;gap:10px;padding:14px;background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;cursor:pointer;">
            <input type="radio" name="deliveryStatus" value="failed" onchange="setDeliveryStatus('failed')" style="accent-color:#e74c3c;flex-shrink:0;">
            <div>
              <div style="font-size:14px;color:#f5f0e8;font-weight:500;">✗ Delivery failed</div>
              <div style="font-size:12px;color:#9a9590;margin-top:2px;">Customer not home / piano doesn't fit / other issue</div>
            </div>
          </label>
        </div>
      </div>

      <div id="issueDetails" style="display:none;margin-bottom:20px;">
        <div style="background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:4px;padding:16px;">
          <div id="issueTypeLabel" style="font-size:13px;color:#e74c3c;font-weight:500;margin-bottom:10px;"></div>
          <label style="font-size:12px;color:#9a9590;display:block;margin-bottom:6px;">Describe what happened *</label>
          <textarea id="issueDescription" rows="4"
            placeholder="Please describe the damage or reason for failed delivery..."
            style="width:100%;padding:12px;background:#1a1a18;border:1px solid rgba(192,57,43,0.3);border-radius:4px;color:#f5f0e8;font-size:14px;resize:vertical;box-sizing:border-box;font-family:'DM Sans',sans-serif;"></textarea>
        </div>
      </div>

      <div style="margin-bottom:24px;">
        <div style="font-size:14px;font-weight:500;color:#f5f0e8;margin-bottom:12px;">Upload photos</div>

        <div id="uploadArea" onclick="document.getElementById('photoInput').click()"
          style="border:2px dashed rgba(184,147,90,0.3);border-radius:4px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color 0.2s ease;margin-bottom:12px;">
          <div style="font-size:36px;margin-bottom:8px;">📷</div>
          <div style="font-size:14px;color:#9a9590;">Tap to take photos or choose from camera roll</div>
          <div style="font-size:12px;color:#6b6760;margin-top:4px;">Minimum 3 photos required</div>
        </div>

        <input type="file" id="photoInput"
          accept="image/*" multiple capture="environment"
          style="display:none"
          onchange="handlePhotoSelect(event)">

        <div id="photoPreview" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;"></div>
        <div id="photoCount" style="font-size:12px;color:#6b6760;margin-top:8px;text-align:center;"></div>
      </div>

      <div style="margin-bottom:24px;">
        <label style="font-size:12px;color:#6b6760;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:8px;">Notes (optional)</label>
        <textarea id="deliveryNotes" rows="3"
          placeholder="Anything to record about the placement or condition..."
          style="width:100%;padding:12px;background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;color:#f5f0e8;font-size:14px;resize:vertical;box-sizing:border-box;font-family:'DM Sans',sans-serif;"></textarea>
      </div>

      <button id="submitBtn" onclick="submitDeliveryPhotos()" disabled
        style="width:100%;background:#444;color:#888;border:none;border-radius:4px;padding:18px;font-size:15px;font-weight:500;letter-spacing:0.05em;cursor:not-allowed;transition:all 0.2s ease;font-family:'DM Sans',sans-serif;">
        ADD AT LEAST 3 PHOTOS TO CONTINUE
      </button>

      <div id="submitError" style="display:none;margin-top:12px;padding:12px;background:rgba(192,57,43,0.1);border-radius:4px;font-size:13px;color:#e74c3c;text-align:center;"></div>

    </div>
  `
}

function handlePhotoSelect(e) {
  const files = Array.from(e.target.files || [])
  if (!files.length) return
  files.forEach(file => {
    if (!file.type.startsWith('image/')) return
    if (selectedPhotos.length >= 10) return
    const reader = new FileReader()
    reader.onload = (ev) => {
      selectedPhotos.push({ file, dataUrl: ev.target.result, name: file.name })
      renderPhotoPreview()
    }
    reader.readAsDataURL(file)
  })
  e.target.value = ''
}

function renderPhotoPreview() {
  const preview = document.getElementById('photoPreview')
  const count   = document.getElementById('photoCount')
  const btn     = document.getElementById('submitBtn')

  preview.innerHTML = selectedPhotos.map((photo, i) => `
    <div style="position:relative;aspect-ratio:1;border-radius:4px;overflow:hidden;">
      <img src="${photo.dataUrl}" style="width:100%;height:100%;object-fit:cover;">
      <button onclick="removePhoto(${i})"
        style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">×</button>
    </div>
  `).join('')

  const n = selectedPhotos.length
  count.textContent = `${n} photo${n !== 1 ? 's' : ''} selected`
  count.style.color = n >= 3 ? '#1D9E75' : '#6b6760'

  if (n >= 3) {
    btn.disabled = false
    btn.style.background = '#b8935a'
    btn.style.color = '#000'
    btn.style.cursor = 'pointer'
    btn.textContent = `CONFIRM DELIVERY — ${n} PHOTO${n !== 1 ? 'S' : ''}`
  } else {
    btn.disabled = true
    btn.style.background = '#444'
    btn.style.color = '#888'
    btn.style.cursor = 'not-allowed'
    btn.textContent = 'ADD AT LEAST 3 PHOTOS TO CONTINUE'
  }
}

function removePhoto(i) {
  selectedPhotos.splice(i, 1)
  renderPhotoPreview()
}

async function submitDeliveryPhotos() {
  if (selectedPhotos.length < 3) return
  const btn     = document.getElementById('submitBtn')
  const errorEl = document.getElementById('submitError')
  btn.disabled = true
  errorEl.style.display = 'none'

  try {
    const uploadedUrls = []
    const deliveryId = currentDelivery.id

    for (let i = 0; i < selectedPhotos.length; i++) {
      btn.textContent = `UPLOADING ${i + 1} OF ${selectedPhotos.length}…`
      const photo = selectedPhotos[i]
      const blob = await (await fetch(photo.dataUrl)).blob()
      const filename = `${deliveryId}/delivery/${Date.now()}-${i + 1}.jpg`
      const { error: upErr } = await _supabase.storage
        .from('delivery-photos')
        .upload(filename, blob, { contentType: 'image/jpeg', upsert: false })
      if (upErr) throw upErr
      const { data: urlData } = _supabase.storage
        .from('delivery-photos')
        .getPublicUrl(filename)
      uploadedUrls.push(urlData.publicUrl)
    }

    btn.textContent = 'CONFIRMING DELIVERY…'
    // Session 13 adds delivery_status + issue_description so the API can
    // branch on damage / failed-delivery and skip the warranty + tuner
    // booking chain when something went wrong.
    const issueDescription = document.getElementById('issueDescription')?.value?.trim() || null
    if (deliveryStatusType !== 'no_issues' && !issueDescription) {
      throw new Error('Please describe what happened before submitting.')
    }
    const res = await fetch('/api/driver-delivery-confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token,
        photo_urls:        uploadedUrls,
        photo_count:       uploadedUrls.length,
        notes:             document.getElementById('deliveryNotes').value.trim() || null,
        delivery_status:   deliveryStatusType,
        issue_description: issueDescription,
      }),
    })
    const result = await res.json().catch(() => ({}))
    if (!res.ok || !result.success) {
      console.error('[dropoff] confirm API failed', result)
      throw new Error(result.error || 'Confirm failed')
    }

    showDeliverySuccess(uploadedUrls.length, deliveryStatusType)
  } catch (err) {
    console.error('[dropoff] upload failed', err)
    btn.disabled = false
    btn.textContent = 'TRY AGAIN'
    btn.style.background = '#c0392b'
    btn.style.color = '#fff'
    errorEl.style.display = 'block'
    errorEl.textContent = 'Upload failed — please check your connection and try again.'
  }
}

function showDeliverySuccess(count, status) {
  const messages = {
    no_issues: {
      icon: '✓', color: '#1D9E75',
      title: 'Delivery confirmed.',
      body: `${count} photos uploaded successfully. The customer has been notified their piano has arrived. Their warranty has been issued automatically.`,
      checklist: [
        'Photos saved to Signature Pianos',
        'Customer notified — piano has arrived',
        '10-year warranty certificate emailed',
        'First tuning auto-booked (~25 days)',
      ],
      checklistColor: '#1D9E75',
    },
    damage: {
      icon: '⚠', color: '#e74c3c',
      title: 'Damage report submitted.',
      body: 'Eric has been notified immediately. Do not leave until you have spoken with Eric.',
      checklist: [
        `Photos saved (${count})`,
        'Damage notes logged',
        'Eric notified urgently',
        'Warranty + tuner booking paused until resolved',
      ],
      checklistColor: '#e74c3c',
    },
    failed: {
      icon: '✗', color: '#e74c3c',
      title: 'Failed delivery logged.',
      body: 'Eric has been notified. Please contact Eric directly to arrange redelivery.',
      checklist: [
        `Photos saved (${count})`,
        'Reason logged',
        'Eric notified — will contact customer',
        'Warranty + tuner booking paused until redelivery',
      ],
      checklistColor: '#e74c3c',
    },
  }
  const m = messages[status] || messages.no_issues
  document.getElementById('pageContent').innerHTML = `
    <div style="min-height:100vh;background:#0e0e0d;display:flex;align-items:center;justify-content:center;padding:40px 24px;">
      <div style="text-align:center;max-width:360px;">
        <div style="font-size:72px;margin-bottom:24px;color:${m.color};">${m.icon}</div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:#f5f0e8;font-style:italic;margin:0 0 16px;">${m.title}</h2>
        <p style="font-size:14px;color:#9a9590;line-height:1.7;margin:0 0 24px;">${m.body}</p>
        <div style="background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;padding:16px;font-size:13px;color:#6b6760;text-align:left;">
          ${m.checklist.map((line, i) => `<div style="margin-bottom:${i === m.checklist.length - 1 ? '0' : '6px'};">${m.icon === '✓' ? '✓' : '•'} ${esc(line)}</div>`).join('')}
        </div>
      </div>
    </div>
  `
}

function showAlreadyConfirmed() {
  document.getElementById('pageContent').innerHTML = `
    <div style="min-height:100vh;background:#0e0e0d;display:flex;align-items:center;justify-content:center;padding:40px 24px;">
      <div style="text-align:center;max-width:360px;">
        <div style="font-size:48px;margin-bottom:16px;color:#1D9E75;">✓</div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#f5f0e8;font-style:italic;margin:0 0 12px;">Delivery already confirmed</h2>
        <p style="font-size:13px;color:#9a9590;line-height:1.7;">This has already been submitted. Contact Signature Pianos if you need help.</p>
      </div>
    </div>
  `
}

function showError(message) {
  document.getElementById('pageContent').innerHTML = `
    <div style="min-height:100vh;background:#0e0e0d;display:flex;align-items:center;justify-content:center;padding:40px 24px;">
      <div style="text-align:center;max-width:360px;">
        <div style="font-size:48px;margin-bottom:16px;color:#b8935a;">✗</div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#f5f0e8;font-style:italic;margin:0 0 12px;">Link not found</h2>
        <p style="font-size:13px;color:#9a9590;line-height:1.7;">${esc(message)}</p>
      </div>
    </div>
  `
}
</script>

</body>
</html>
