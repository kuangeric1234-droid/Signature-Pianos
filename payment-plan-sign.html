<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Sign your payment plan — Signature Pianos</title>
<meta name="robots" content="noindex, nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

<style>
  :root {
    --bg-1: #0e0e0d; --bg-2: #1a1a18; --bg-3: #242422;
    --gold: #b8935a; --gold-light: #d4b483;
    --text-1: #f5f0e8; --text-2: #9a9590; --text-3: #6b6760;
    --border: rgba(184, 147, 90, 0.15);
    --border-strong: rgba(184, 147, 90, 0.4);
    --green: #1D9E75;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-1); color: var(--text-1);
    font-family: 'DM Sans', sans-serif; font-weight: 300; line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .loading {
    text-align: center; color: var(--text-2);
    font-size: 14px; padding: 80px 24px;
  }
  .success-wrap {
    text-align: center; padding: 80px 24px;
  }
  .success-wrap .icon {
    font-size: 64px; color: var(--gold);
    display: block; margin-bottom: 24px;
  }
  .success-wrap h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 300; color: var(--text-1);
    font-style: italic; margin: 0 0 16px;
  }
  .success-wrap p {
    font-size: 14px; color: var(--text-2);
    line-height: 1.7; max-width: 400px; margin: 0 auto;
  }
</style>
</head>
<body>

<div id="pageContent">
  <div class="loading">
    <i class="ti ti-loader"></i>
    <p>Loading your payment plan…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.min.js"></script>
<script src="/js/config.js"></script>
<script>
/* ============================================================================
   Signature Pianos — public payment-plan signing page (4-section flow)
   ----------------------------------------------------------------------------
   Steps:
     1. Review agreement     — HTML preview + PDF download
     2. Upload government ID — uploads to id-documents/{planId}/
     3. Payment method       — Stripe Elements (credit_card) OR bank details
     4. Sign                 — signature canvas + full name + checkbox

   Public — token-gated via signature_token on payment_plans. Anon RLS lets
   us SELECT the plan and INSERT into the id-documents bucket. Every writing
   action routes through /api/save-payment-method or /api/sign-contract under
   the service role.
   ============================================================================ */

const params = new URLSearchParams(window.location.search)
const token  = params.get('token')
if (!token) { window.location.replace('index.html') }

// Module-level state — referenced across renderAgreementHTML, PDF generation,
// Stripe setup, ID upload, and signature submission.
let currentPlan        = null
let currentInstalments = []
let currentSettings    = {}
let idFileSelected     = null
let idDocumentUrl      = null
let stripe             = null
let cardElement        = null

// Exposed for the user-spec snippets that reference window.planToken.
window.planToken = token

/* ---------- Helpers ---------- */
function esc(s) {
  if (s == null) return ''
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
}
function fmtCur(v) {
  return '$' + Math.abs(Number(v || 0)).toLocaleString('en-AU', {
    minimumFractionDigits: 2, maximumFractionDigits: 2,
  })
}
function fmtDateAU(d) {
  if (!d) return '—'
  const [y, m, day] = String(d).split('T')[0].split('-')
  if (!y || !m || !day) return d
  return `${day}/${m}/${y}`
}

/* ---------- Load plan ---------- */
;(async function loadPlan() {
  try {
    const { data: plan, error } = await _supabase
      .from('payment_plans')
      .select(`*, customer:customer_id(*), piano:piano_id(*)`)
      .eq('signature_token', token)
      .maybeSingle()
    if (error) throw error
    if (!plan)  return showError("We couldn't find this contract. The link may have expired.")
    if (plan.contract_signed) return showAlreadySigned(plan)

    const [{ data: ins }, { data: cs }] = await Promise.all([
      _supabase.from('payment_instalments')
        .select('*')
        .eq('payment_plan_id', plan.id)
        .order('instalment_number'),
      _supabase.from('company_settings').select('*').limit(1).maybeSingle(),
    ])

    currentPlan        = plan
    currentInstalments = ins || []
    currentSettings    = cs || {}

    renderSigningPage(plan, currentInstalments, currentSettings)
  } catch (err) {
    console.error('[sign] load failed', err)
    showError("We couldn't load this contract. Please try again or contact us.")
  }
})()

/* ============================================================================
   Page shell — 4 sections + progress indicator
   ============================================================================ */
function renderSigningPage(plan, instalments, settings) {
  document.getElementById('pageContent').innerHTML = `

    <div style="background:#1a1917;padding:20px 24px;border-bottom:1px solid rgba(184,147,90,0.2);position:sticky;top:0;z-index:10;">
      <div style="font-size:16px;color:#b8935a;font-style:italic;">Signature Pianos</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;">
        Payment Plan Agreement · ${esc(plan.plan_number || '')}
      </div>
    </div>

    <div style="max-width:640px;margin:0 auto;padding:24px;">

      <!-- Progress -->
      <div style="display:flex;gap:0;margin-bottom:32px;">
        ${['Agreement','ID Upload','Payment','Sign'].map((step, i) => `
          <div style="flex:1;text-align:center;">
            <div id="step${i+1}indicator" style="width:32px;height:32px;border-radius:50%;background:${i === 0 ? '#b8935a' : 'rgba(255,255,255,0.1)'};color:${i === 0 ? '#000' : 'rgba(255,255,255,0.3)'};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;margin:0 auto 6px;">
              ${i + 1}
            </div>
            <div style="font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.08em;">
              ${step}
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Section 1 — Agreement review -->
      <div id="section1">
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#f5f0e8;font-style:italic;margin:0 0 8px;">
          Review your agreement
        </h2>
        <p style="font-size:14px;color:#9a9590;margin:0 0 20px;line-height:1.6;">
          Please read through your payment plan agreement carefully before proceeding.
        </p>

        <div style="background:#fff;border-radius:4px;padding:28px;margin-bottom:20px;border:1px solid rgba(184,147,90,0.3);">
          ${renderAgreementHTML(plan, instalments, settings)}
        </div>

        <button id="downloadPdfBtn" style="width:100%;background:transparent;border:1px solid rgba(184,147,90,0.4);color:#b8935a;border-radius:4px;padding:12px;font-size:13px;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'DM Sans',sans-serif;">
          <i class="ti ti-download"></i> Download agreement PDF
        </button>

        <button id="section1ContinueBtn" style="width:100%;background:#b8935a;color:#000;border:none;border-radius:4px;padding:16px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">
          I have read the agreement — continue →
        </button>
      </div>

      <!-- Section 2 — ID upload -->
      <div id="section2" style="display:none;">
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#f5f0e8;font-style:italic;margin:0 0 8px;">
          Verify your identity
        </h2>
        <p style="font-size:14px;color:#9a9590;margin:0 0 20px;line-height:1.6;">
          Please upload a photo of your government-issued ID. Accepted: passport, driver's licence, or any government ID card.
        </p>

        <div id="idUploadArea" style="border:2px dashed rgba(184,147,90,0.3);border-radius:4px;padding:32px 20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:all 0.2s ease;">
          <div style="font-size:36px;margin-bottom:8px;">🪪</div>
          <div style="font-size:14px;color:#9a9590;">Tap to take a photo or choose from camera roll</div>
          <div style="font-size:12px;color:#6b6760;margin-top:4px;">Passport · Driver's licence · Government ID</div>
        </div>

        <input type="file" id="idFileInput" accept="image/*,application/pdf" capture="environment" style="display:none">

        <div id="idPreview" style="display:none;margin-bottom:16px;text-align:center;">
          <img id="idPreviewImg" style="max-width:100%;max-height:200px;border-radius:4px;border:1px solid rgba(184,147,90,0.3);">
          <div style="font-size:12px;color:#1D9E75;margin-top:8px;">
            <i class="ti ti-check"></i> ID document selected
          </div>
        </div>

        <div style="background:rgba(184,147,90,0.05);border:1px solid rgba(184,147,90,0.2);border-radius:4px;padding:12px;margin-bottom:16px;">
          <div style="font-size:12px;color:#9a9590;line-height:1.6;">
            <i class="ti ti-lock" style="color:#b8935a;"></i>
            Your ID is encrypted and stored securely. It is only used for identity verification purposes and will not be shared with third parties.
          </div>
        </div>

        <button id="idContinueBtn" disabled style="width:100%;background:#444;color:#888;border:none;border-radius:4px;padding:16px;font-size:15px;font-weight:500;cursor:not-allowed;font-family:'DM Sans',sans-serif;">
          SELECT YOUR ID TO CONTINUE
        </button>
      </div>

      <!-- Section 3 — Payment method -->
      <div id="section3" style="display:none;">
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#f5f0e8;font-style:italic;margin:0 0 8px;">
          Payment method
        </h2>
        <p style="font-size:14px;color:#9a9590;margin:0 0 20px;line-height:1.6;">
          ${plan.payment_method === 'credit_card'
            ? `Your plan uses credit card. A ${esc(plan.surcharge_percentage || '1.5')}% surcharge has been applied.`
            : 'Your plan uses bank transfer. Payment details will be provided in your confirmation email.'}
        </p>

        ${plan.payment_method === 'credit_card' ? `
          <div style="background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;padding:20px;margin-bottom:20px;">
            <div style="font-size:12px;color:#6b6760;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;">Card details</div>
            <div id="cardElement" style="background:#0e0e0d;padding:14px;border-radius:4px;border:1px solid rgba(184,147,90,0.2);"></div>
            <div id="cardError" style="color:#e74c3c;font-size:12px;margin-top:8px;display:none;"></div>
          </div>

          <div style="background:rgba(184,147,90,0.05);border:1px solid rgba(184,147,90,0.2);border-radius:4px;padding:12px;margin-bottom:16px;">
            <div style="font-size:12px;color:#9a9590;line-height:1.6;">
              <i class="ti ti-lock" style="color:#b8935a;"></i>
              Your card is saved securely via Stripe. If an instalment becomes overdue it will be automatically charged to this card after a 3-day grace period.
            </div>
          </div>

          <button id="saveCardBtn" style="width:100%;background:#b8935a;color:#000;border:none;border-radius:4px;padding:16px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">
            SAVE CARD & CONTINUE
          </button>
        ` : `
          <div style="background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;padding:20px;margin-bottom:20px;">
            <div style="font-size:12px;color:#6b6760;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;">Bank transfer details</div>
            <div style="font-size:13px;color:#f5f0e8;line-height:1.8;">
              BSB: ${esc(settings?.bank_bsb || 'See confirmation email')}<br>
              Account: ${esc(settings?.bank_account || 'See confirmation email')}<br>
              Account name: ${esc(settings?.bank_account_name || 'Signature Pianos')}<br>
              Reference: ${esc(plan.plan_number || '')}
            </div>
          </div>

          <div style="background:rgba(26,127,75,0.1);border:1px solid rgba(26,127,75,0.3);border-radius:4px;padding:12px;margin-bottom:16px;">
            <div style="font-size:12px;color:#1D9E75;line-height:1.6;">
              Please use your plan number <strong>${esc(plan.plan_number || '')}</strong> as the payment reference for all transfers.
            </div>
          </div>

          <button id="bankTransferContinueBtn" style="width:100%;background:#b8935a;color:#000;border:none;border-radius:4px;padding:16px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">
            CONTINUE TO SIGN →
          </button>
        `}
      </div>

      <!-- Section 4 — Sign -->
      <div id="section4" style="display:none;">
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#f5f0e8;font-style:italic;margin:0 0 8px;">
          Sign your agreement
        </h2>
        <p style="font-size:14px;color:#9a9590;margin:0 0 20px;line-height:1.6;">
          Please sign below to confirm your agreement to the payment plan terms and conditions.
        </p>

        <div style="background:#fff;border-radius:4px;margin-bottom:12px;overflow:hidden;border:1px solid rgba(184,147,90,0.3);">
          <div style="background:#f8f7f5;padding:8px 14px;font-size:11px;color:#9a9590;border-bottom:1px solid #e8e4dd;">
            Sign here
          </div>
          <div style="position:relative;">
            <canvas id="signatureCanvas" style="width:100%;height:160px;display:block;touch-action:none;cursor:crosshair;background:#fafafa;"></canvas>
            <div id="signaturePlaceholder" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
              <span style="font-size:13px;color:#ccc;font-style:italic;">Sign with your mouse or finger</span>
            </div>
          </div>
        </div>

        <button id="clearSigBtn" style="background:none;border:1px solid #e8e4dd;border-radius:4px;padding:7px 14px;font-size:12px;cursor:pointer;color:#6b6760;margin-bottom:16px;">
          Clear signature
        </button>

        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:#6b6760;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:8px;">
            Type your full name to confirm *
          </label>
          <input type="text" id="signatureFullName" placeholder="Your full legal name" style="width:100%;padding:12px;background:#1a1a18;border:1px solid rgba(184,147,90,0.2);border-radius:4px;color:#f5f0e8;font-size:14px;box-sizing:border-box;">
        </div>

        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:24px;">
          <input type="checkbox" id="agreeCheckbox" style="margin-top:3px;accent-color:#b8935a;flex-shrink:0;">
          <span style="font-size:13px;color:#9a9590;line-height:1.6;">
            I confirm I have read and agree to the Signature Pianos payment plan terms and conditions.
            ${plan.payment_method === 'credit_card'
              ? ' I authorise Signature Pianos to charge my saved card for overdue instalments after a 3-day grace period.'
              : ''}
          </span>
        </label>

        <button id="submitSignatureBtn" style="width:100%;background:#b8935a;color:#000;border:none;border-radius:4px;padding:18px;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:0.05em;font-family:'DM Sans',sans-serif;">
          SIGN AND SUBMIT CONTRACT
        </button>

        <div id="signError" style="display:none;margin-top:12px;padding:12px;background:rgba(192,57,43,0.1);border-radius:4px;font-size:13px;color:#e74c3c;text-align:center;"></div>
      </div>

    </div>
  `

  // Wire section 1
  document.getElementById('downloadPdfBtn').addEventListener('click', downloadAgreementPDF)
  document.getElementById('section1ContinueBtn').addEventListener('click', () => goToSection(2))

  // Wire section 2
  document.getElementById('idUploadArea').addEventListener('click', () => document.getElementById('idFileInput').click())
  document.getElementById('idFileInput').addEventListener('change', handleIDUpload)
  document.getElementById('idContinueBtn').addEventListener('click', uploadIDAndContinue)

  // Wire section 3
  if (plan.payment_method === 'credit_card') {
    document.getElementById('saveCardBtn').addEventListener('click', saveCardAndContinue)
  } else {
    document.getElementById('bankTransferContinueBtn').addEventListener('click', () => goToSection(4))
  }

  // Wire section 4 — canvas init is deferred to goToSection(4) because
  // a canvas inside a display:none parent has zero dimensions and
  // getBoundingClientRect() returns 0×0, which breaks drawing.
  document.getElementById('clearSigBtn').addEventListener('click', () => window.clearSignature && window.clearSignature())
  document.getElementById('submitSignatureBtn').addEventListener('click', () => submitSignature(plan.id))

  initStripeIfNeeded(plan)
}

function goToSection(num) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById(`section${i}`)
    if (el) el.style.display = i === num ? 'block' : 'none'

    const indicator = document.getElementById(`step${i}indicator`)
    if (indicator) {
      indicator.style.background =
        i < num  ? '#1D9E75' :
        i === num ? '#b8935a' :
                    'rgba(255,255,255,0.1)'
      indicator.style.color = i <= num ? '#000' : 'rgba(255,255,255,0.3)'
      indicator.textContent = i < num ? '✓' : String(i)
    }
  }
  window.scrollTo(0, 0)

  // Initialise the signature canvas the first time (and on every revisit)
  // section 4 becomes visible. A canvas inside a display:none parent has
  // getBoundingClientRect() == 0×0, which leaves the canvas at 0px
  // internal resolution and prevents drawing. setTimeout(…, 100) lets the
  // browser commit the layout change before we measure.
  if (num === 4) {
    setTimeout(initSignatureCanvas, 100)
  }
}

/* ============================================================================
   Agreement HTML (Step 5) — rendered inside the white doc card
   ============================================================================ */
function renderAgreementHTML(plan, instalments, settings) {
  const formatCurrency = (v) =>
    '$' + Math.abs(v || 0).toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
  const formatDate = (d) => {
    if (!d) return '—'
    const [y, m, day] = (String(d).split('T')[0]).split('-')
    return `${day}/${m}/${y}`
  }

  return `
    <div style="font-family:Georgia,serif;color:#1a1917;">

      <div style="text-align:center;padding-bottom:20px;border-bottom:2px solid #1a1917;margin-bottom:20px;">
        <div style="font-size:22px;color:#b8935a;font-style:italic;margin-bottom:4px;">
          ${esc(settings?.business_name || 'Signature Pianos')}
        </div>
        ${settings?.abn ? `<div style="font-size:11px;color:#9a9590;">ABN: ${esc(settings.abn)}</div>` : ''}
        <div style="font-size:16px;font-weight:bold;text-transform:uppercase;letter-spacing:0.12em;margin-top:12px;color:#1a1917;">
          Payment Plan Agreement
        </div>
        <div style="font-size:12px;color:#9a9590;margin-top:4px;">
          ${esc(plan.plan_number || '')} · Dated ${formatDate(plan.start_date)}
        </div>
      </div>

      <div style="font-size:13px;line-height:1.8;margin-bottom:16px;color:#1a1917;">
        This Payment Plan Agreement (<strong>"Agreement"</strong>) is entered into between
        <strong>${esc(settings?.business_name || 'Signature Pianos')}</strong>
        ${settings?.abn ? `(ABN ${esc(settings.abn)})` : ''}
        of ${esc([settings?.address_line1, settings?.suburb, settings?.state, settings?.postcode].filter(Boolean).join(', ') || 'Melbourne, Victoria')}
        (<strong>"Seller"</strong>) and
        <strong>${esc(plan.customer?.first_name || '')} ${esc(plan.customer?.last_name || '')}</strong>
        ${plan.customer?.email ? `(${esc(plan.customer.email)})` : ''}
        (<strong>"Buyer"</strong>).
      </div>

      <div style="background:#f8f7f5;padding:14px;border-radius:4px;margin-bottom:16px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#9a9590;margin-bottom:8px;">Instrument</div>
        <div style="font-size:14px;font-weight:bold;">
          ${esc(plan.piano?.brand || 'Yamaha')} ${esc(plan.piano?.model || '')} ${plan.piano?.type ? esc(String(plan.piano.type).replace(/_/g, ' ')) : ''}
        </div>
        <div style="font-size:12px;color:#6b6760;margin-top:2px;">
          Year: ${esc(plan.piano?.year || '—')} ·
          Serial: ${esc(plan.piano?.serial_number || '—')} ·
          Condition: ${esc(plan.piano?.condition || '—')}
        </div>
      </div>

      <div style="margin-bottom:16px;">
        <div style="font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:0.08em;color:#1a1917;border-bottom:1px solid #e8e4dd;padding-bottom:6px;margin-bottom:10px;">
          Payment Terms
        </div>
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <tr>
            <td style="padding:6px 0;color:#6b6760;border-bottom:1px solid #f0f0f0;width:50%;">Total purchase price</td>
            <td style="padding:6px 0;font-weight:bold;border-bottom:1px solid #f0f0f0;text-align:right;">${formatCurrency(plan.total_amount)}</td>
          </tr>
          ${Number(plan.surcharge_amount) > 0 ? `
            <tr>
              <td style="padding:6px 0;color:#6b6760;border-bottom:1px solid #f0f0f0;">Credit card surcharge (${esc(plan.surcharge_percentage || '1.5')}%)</td>
              <td style="padding:6px 0;border-bottom:1px solid #f0f0f0;text-align:right;">${formatCurrency(plan.surcharge_amount)}</td>
            </tr>
            <tr>
              <td style="padding:6px 0;color:#6b6760;border-bottom:1px solid #f0f0f0;">Total payable</td>
              <td style="padding:6px 0;font-weight:bold;border-bottom:1px solid #f0f0f0;text-align:right;color:#b8935a;">${formatCurrency(plan.total_with_surcharge)}</td>
            </tr>
          ` : ''}
          <tr>
            <td style="padding:6px 0;color:#6b6760;border-bottom:1px solid #f0f0f0;">Deposit</td>
            <td style="padding:6px 0;border-bottom:1px solid #f0f0f0;text-align:right;">
              ${formatCurrency(plan.deposit_amount)}
              ${plan.deposit_paid ? ' <span style="color:#1D9E75;">✓ Paid</span>' : ''}
            </td>

/* ============================================================================

   ============================================================================ */
function handleIDUpload(e) {
  const file = e.target.files && e.target.files[0]
  if (!file) return

  idFileSelected = file

  const preview = document.getElementById('idPreview')
  const previewImg = document.getElementById('idPreviewImg')

  if (file.type && file.type.startsWith('image/')) {
    const reader = new FileReader()
    reader.onload = (ev) => {
      previewImg.src = ev.target.result
      previewImg.style.display = ''
      preview.style.display = 'block'
      document.getElementById('idUploadArea').style.borderColor = 'rgba(29,158,117,0.5)'
    }
    reader.readAsDataURL(file)
  } else {
    // PDF or other — show filename instead of image preview
    preview.style.display = 'block'
    preview.innerHTML = `
      <div style="padding:16px;background:#1a1a18;border-radius:4px;font-size:13px;color:#1D9E75;">
        <i class="ti ti-file-check"></i> ${esc(file.name)} selected
      </div>
    `
  }

  const btn = document.getElementById('idContinueBtn')
  btn.disabled = false
  btn.style.background = '#b8935a'
  btn.style.color = '#000'
  btn.style.cursor = 'pointer'
  btn.textContent = 'UPLOAD ID & CONTINUE'
}

async function uploadIDAndContinue() {
  if (!idFileSelected) return

  const btn = document.getElementById('idContinueBtn')
  btn.textContent = 'UPLOADING…'
  btn.disabled = true

  try {
    const planId = currentPlan.id
    const ext = (idFileSelected.name.split('.').pop() || 'jpg').toLowerCase()
    const filename = `${planId}/id-${Date.now()}.${ext}`

    const { data, error } = await _supabase.storage
      .from('id-documents')
      .upload(filename, idFileSelected, {
        contentType: idFileSelected.type || 'application/octet-stream',
        upsert: false,
      })
    if (error) throw error

    // Save the Storage path. /api/sign-contract converts it to a signed URL
    // or fetches it as service role — we never publicly expose it.
    idDocumentUrl = data.path
    goToSection(3)
  } catch (err) {
    console.error('[sign] ID upload failed', err)
    btn.disabled = false
    btn.style.background = '#c0392b'
    btn.style.color = '#fff'
    btn.textContent = 'UPLOAD FAILED — TRY AGAIN'
  }
}

function initStripeIfNeeded(plan) {
  if (plan.payment_method !== 'credit_card') return
  if (!window.Stripe || !window.STRIPE_PUBLIC_KEY) {
    console.warn('[sign] Stripe.js or STRIPE_PUBLIC_KEY not available')

  }

  stripe = Stripe(window.STRIPE_PUBLIC_KEY)
  const elements = stripe.elements({
    appearance: {
      theme: 'night',
      variables: {
        colorPrimary:    '#b8935a',
        colorBackground: '#0e0e0d',
        colorText:       '#f5f0e8',
        colorDanger:     '#e74c3c',
        borderRadius:    '4px',
      },
    },
  })

  cardElement = elements.create('card', {
    style: {
      base: {
        color: '#f5f0e8',
        fontFamily: 'DM Sans, sans-serif',
        fontSize: '15px',
        '::placeholder': { color: '#6b6760' },

  cardElement.mount('#cardElement')

  cardElement.on('change', (event) => {

  })

async function saveCardAndContinue() {
  if (!stripe || !cardElement) {
    document.getElementById('cardError').style.display = 'block'
    document.getElementById('cardError').textContent = 'Card form not ready — please refresh.'
    return
  }

  const btn = document.getElementById('saveCardBtn')
  btn.textContent = 'SAVING CARD…'
  btn.disabled = true

  try {
    const { paymentMethod, error } = await stripe.createPaymentMethod({
      type: 'card',
      card: cardElement,
      billing_details: {
        name:  `${currentPlan.customer?.first_name || ''} ${currentPlan.customer?.last_name || ''}`.trim(),
        email: currentPlan.customer?.email || '',
      },
    })

    if (error) {
      document.getElementById('cardError').style.display = 'block'
      document.getElementById('cardError').textContent = error.message
      btn.textContent = 'SAVE CARD & CONTINUE'
      btn.disabled = false
      return
    }

    const res = await fetch('/api/save-payment-method', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token:             window.planToken,
        plan_id:           currentPlan.id,
        payment_method_id: paymentMethod.id,
        card_last_four:    paymentMethod.card.last4,
        card_brand:        paymentMethod.card.brand,
      }),
    })
    const result = await res.json().catch(() => ({}))
    if (res.ok && result.success) {
      goToSection(4)
    } else {
      throw new Error(result.error || 'Could not save card')
    }
  } catch (err) {
    console.error('[sign] card save failed', err)
    btn.textContent = 'SAVE CARD & CONTINUE'
    btn.disabled = false
    document.getElementById('cardError').style.display = 'block'
    document.getElementById('cardError').textContent = 'Failed to save card — please try again.'
  }
}

/* ============================================================================
   Signature canvas — initialises lazily once section 4 is visible.
   Clones the existing <canvas> first to drop any stale event listeners
   from a previous goToSection(4) call (without cloning, navigating back
   and forward to section 4 would accumulate duplicate listeners).
   All draw functions then close over the fresh in-DOM node + context.
   ============================================================================ */
function initSignatureCanvas() {
  const oldCanvas = document.getElementById('signatureCanvas')
  if (!oldCanvas) return

  // Clone-then-replace BEFORE we capture any references in closures.
  // If we cloned after wiring, the closures would hold the detached
  // node and ctx, breaking drawing.
  const cloned = oldCanvas.cloneNode(false)
  oldCanvas.parentNode.replaceChild(cloned, oldCanvas)
  const canvas      = document.getElementById('signatureCanvas')
  const placeholder = document.getElementById('signaturePlaceholder')

  // HiDPI — measure the now-visible canvas and back-fill internal
  // resolution at devicePixelRatio. rect.width can still be 0 if
  // a layout race occurs; fall back to clientWidth in that case.
  const rect = canvas.getBoundingClientRect()
  const dpr  = window.devicePixelRatio || 1
  const cssW = rect.width  || canvas.clientWidth  || 0
  const cssH = rect.height || canvas.clientHeight || 160

  canvas.width  = Math.max(1, Math.floor(cssW * dpr))
  canvas.height = Math.max(1, Math.floor(cssH * dpr))
  canvas.style.width  = cssW + 'px'
  canvas.style.height = '160px'
  if (placeholder) placeholder.style.display = 'flex'

  const ctx = canvas.getContext('2d')
  ctx.scale(dpr, dpr)
  ctx.strokeStyle = '#1a1917'
  ctx.lineWidth   = 2.5
  ctx.lineCap     = 'round'
  ctx.lineJoin    = 'round'

  let drawing      = false
  let hasSignature = false

  function getPos(e) {
    const r = canvas.getBoundingClientRect()
    const t = e.touches ? e.touches[0] : e
    return { x: t.clientX - r.left, y: t.clientY - r.top }
  }
  function startDraw(e) {
    e.preventDefault()
    drawing = true
    const p = getPos(e)
    ctx.beginPath()
    ctx.moveTo(p.x, p.y)
    if (!hasSignature) {
      hasSignature = true
      if (placeholder) placeholder.style.display = 'none'
    }
  }
  function draw(e) {
    if (!drawing) return
    e.preventDefault()
    const p = getPos(e)
    ctx.lineTo(p.x, p.y)
    ctx.stroke()
  }
  function stopDraw() {
    if (!drawing) return
    drawing = false
    ctx.beginPath()
  }

  canvas.addEventListener('mousedown',   startDraw)
  canvas.addEventListener('mousemove',   draw)
  canvas.addEventListener('mouseup',     stopDraw)
  canvas.addEventListener('mouseleave',  stopDraw)
  canvas.addEventListener('touchstart',  startDraw, { passive: false })
  canvas.addEventListener('touchmove',   draw,      { passive: false })
  canvas.addEventListener('touchend',    stopDraw)
  canvas.addEventListener('touchcancel', stopDraw)

  // Globals — getSignatureDataURL re-fetches the canvas by id at call
  // time as a defence against the closure ever pointing at a stale node.
  window.clearSignature = function () {
    const r = canvas.getBoundingClientRect()
    ctx.clearRect(0, 0, r.width, r.height)
    hasSignature = false
    if (placeholder) placeholder.style.display = 'flex'
  }
  window.getSignatureDataURL = function () {
    const c = document.getElementById('signatureCanvas')
    return (hasSignature && c) ? c.toDataURL('image/png') : null
  }
  window.hasSignatureDrawn = function () {
    return hasSignature
  }
}

/* ============================================================================
   Submit signature (Step 10) — bundles ID document path
   ============================================================================ */
async function submitSignature(planId) {
  const fullName = document.getElementById('signatureFullName').value.trim()
  const agreed   = document.getElementById('agreeCheckbox').checked
  const hasDrawn = window.hasSignatureDrawn && window.hasSignatureDrawn()
  const sigData  = window.getSignatureDataURL && window.getSignatureDataURL()
  const err      = document.getElementById('signError')

  function showErr(msg) {
    err.textContent = msg
    err.style.display = 'block'
  }
  err.style.display = 'none'

  if (!hasDrawn) return showErr('Please draw your signature above.')
  if (!fullName) return showErr('Please type your full name to confirm.')
  if (!agreed)   return showErr('Please check the box to confirm you agree to the terms.')

  const btn      = document.getElementById('submitSignatureBtn')
  const original = btn.textContent
  btn.textContent = 'SUBMITTING…'
  btn.disabled = true

  try {
    const res = await fetch('/api/sign-contract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        plan_id:         planId,
        token,
        signature_data:  sigData,
        full_name:       fullName,
        signed_at:       new Date().toISOString(),
        id_document_url: idDocumentUrl,
      }),
    })
    const result = await res.json().catch(() => ({}))
    if (res.ok && result.success) {
      showSignedSuccess()
    } else {
      console.error('[sign] submit failed', result)
      showErr(result.error || 'Something went wrong — please try again.')
      btn.textContent = original
      btn.disabled = false
    }
  } catch (e) {
    console.error('[sign] submit fetch failed', e)
    showErr('Something went wrong — please try again.')
    btn.textContent = original
    btn.disabled = false
  }
}

/* ============================================================================
   End states
   ============================================================================ */
function showSignedSuccess() {
  document.getElementById('pageContent').innerHTML = `
    <div class="success-wrap">
      <i class="ti ti-circle-check icon"></i>
      <h2>Contract signed.</h2>
      <p>Thank you. Your signed contract has been saved. A copy will be emailed to you shortly.</p>
    </div>
  `
}

function showAlreadySigned(plan) {
  document.getElementById('pageContent').innerHTML = `
    <div class="success-wrap">
      <i class="ti ti-circle-check icon"></i>
      <h2>Contract already signed.</h2>
      <p>This contract was signed on ${fmtDateAU(plan.contract_signed_at)}. Please contact us if you have any questions.</p>
    </div>
  `
}

function showError(msg) {
  document.getElementById('pageContent').innerHTML = `
    <div class="loading">
      <i class="ti ti-alert-circle" style="font-size:36px;color:var(--gold);display:block;margin-bottom:12px;"></i>
      <p>${esc(msg)}</p>
    </div>
  `
}
</script>
