<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teachers — Signature Pianos Admin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <span style="font-family:'DM Sans';font-size:13px;font-weight:500;color:#b8935a;letter-spacing:0.1em;">SIGNATURE</span>
      <span style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.15em;display:block;margin-top:2px;">ADMIN</span>
    </div>
    <nav class="admin-nav">
      <a href="dashboard.html"  class="admin-nav-item" data-page="dashboard"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
      <a href="enquiries.html"  class="admin-nav-item" data-page="enquiries"><i class="ti ti-mail"></i> Enquiries <span class="nav-badge" id="enquiriesBadge"></span></a>
      <a href="inventory.html"  class="admin-nav-item" data-page="inventory"><i class="ti ti-piano"></i> Inventory</a>
      <a href="orders.html"     class="admin-nav-item" data-page="orders"><i class="ti ti-receipt"></i> Orders &amp; POS</a>
      <a href="customers.html"  class="admin-nav-item" data-page="customers"><i class="ti ti-users"></i> Customers</a>
      <a href="deliveries.html" class="admin-nav-item" data-page="deliveries"><i class="ti ti-truck-delivery"></i> Deliveries</a>
      <a href="teachers.html"   class="admin-nav-item" data-page="teachers"><i class="ti ti-music"></i> Teachers</a>
      <a href="settings.html"   class="admin-nav-item" data-page="settings"><i class="ti ti-settings"></i> Settings</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="https://signaturepianos.com.au/" target="_blank" style="font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;display:flex;align-items:center;gap:6px;">
        <i class="ti ti-external-link" style="font-size:13px;"></i> View live site
      </a>
      <button onclick="adminSignOut()" style="font-size:12px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;margin-top:8px;">
        <i class="ti ti-logout" style="font-size:13px;"></i> Sign out
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;">
        <button class="admin-burger" aria-label="Menu"><i class="ti ti-menu-2"></i></button>
        <h1 class="admin-page-title">Teachers</h1>
      </div>
      <div class="admin-topbar-right">
        <span style="font-size:13px;color:var(--admin-text-muted);" data-admin-name>—</span>
      </div>
    </div>

    <div class="admin-content">

      <div class="stats-strip">
        <div class="stat"><span class="stat-label">Total teachers</span><span class="stat-value" id="statTotal">—</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-label">Active listings</span><span class="stat-value" id="statActive">—</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-label">Pending verification</span><span class="stat-value" id="statPending">—</span></div>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Suburb</th>
              <th>Tier</th>
              <th>Listing</th>
              <th>Verified</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="teachersTableBody">
            <tr><td colspan="7"><div class="empty-state"><i class="ti ti-loader"></i><p>Loading…</p></div></td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="js/admin-auth.js"></script>
<script src="js/admin-nav.js"></script>
<script>
let allTeachers = []

;(async function init() {
  const admin = await checkAdminAuth()
  if (!admin) return
  await loadTeachers()
})()

async function loadTeachers() {
  try {
    const { data, error } = await adminSupabase
      .from('teachers')
      .select('*, teacher_listings(id, slug, status)')
      .order('created_at', { ascending: false })
    if (error) throw error
    allTeachers = data || []
    renderStats()
    renderTable()
  } catch (err) {
    console.error('[teachers] load failed', err)
    document.getElementById('teachersTableBody').innerHTML =
      `<tr><td colspan="7"><div class="empty-state"><i class="ti ti-alert-circle"></i><p>Couldn't load teachers.</p></div></td></tr>`
  }
}

function renderStats() {
  document.getElementById('statTotal').textContent   = allTeachers.length
  document.getElementById('statActive').textContent  = allTeachers.filter(t => t.listing_active).length
  document.getElementById('statPending').textContent = allTeachers.filter(t => !t.verified).length
}

function renderTable() {
  const body = document.getElementById('teachersTableBody')
  if (!allTeachers.length) {
    body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="ti ti-mood-empty"></i><p>No teachers yet.</p></div></td></tr>`
    return
  }
  body.innerHTML = allTeachers.map(t => {
    const fullName = `${esc(t.first_name || '')} ${esc(t.last_name || '')}`.trim() || '—'
    const tierClass = t.tier === 'full_saas' ? 'pill pill--gold' : 'pill pill--grey'
    const listingDot = t.listing_active
      ? `<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--admin-green);display:inline-block;"></span>Active</span>`
      : `<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--admin-text-muted);"><span style="width:8px;height:8px;border-radius:50%;background:var(--admin-border-dark);display:inline-block;"></span>Paused</span>`
    const verified = t.verified
      ? `<i class="ti ti-circle-check" style="color:var(--admin-green);font-size:18px;" title="Verified"></i>`
      : `<i class="ti ti-clock" style="color:var(--admin-amber);font-size:18px;" title="Pending verification"></i>`
    const listingSlug = (t.teacher_listings && t.teacher_listings[0]) ? t.teacher_listings[0].slug : null
    const viewLink = listingSlug
      ? `<a class="icon-btn" href="../teachers.html#${esc(listingSlug)}" target="_blank" title="View listing"><i class="ti ti-eye"></i></a>`
      : `<button class="icon-btn" disabled title="No listing yet" style="opacity:0.4;cursor:not-allowed;"><i class="ti ti-eye"></i></button>`
    return `
      <tr data-id="${esc(t.id)}">
        <td class="name-cell">${fullName}</td>
        <td>${esc(t.suburb || '—')}</td>
        <td><span class="${tierClass}">${esc(t.tier === 'full_saas' ? 'Full SaaS' : 'Listing only')}</span></td>
        <td>${listingDot}</td>
        <td style="text-align:center;">${verified}</td>
        <td>${fmtDate(t.created_at)}</td>
        <td>
          <div class="actions-cell">
            ${viewLink}
            <button class="icon-btn is-green" data-action="verify" title="${t.verified ? 'Unverify' : 'Mark verified'}"><i class="ti ti-check"></i></button>
            <button class="icon-btn" data-action="tier" title="Toggle tier"><i class="ti ti-shield"></i></button>
          </div>
        </td>
      </tr>
    `
  }).join('')

  body.querySelectorAll('[data-action="verify"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.closest('tr').dataset.id
      const t = allTeachers.find(x => x.id === id)
      if (t) updateTeacher(id, { verified: !t.verified })
    })
  })
  body.querySelectorAll('[data-action="tier"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.closest('tr').dataset.id
      const t = allTeachers.find(x => x.id === id)
      if (t) updateTeacher(id, { tier: t.tier === 'full_saas' ? 'listing_only' : 'full_saas' })
    })
  })
}

async function updateTeacher(id, patch) {
  try {
    const { error } = await adminSupabase
      .from('teachers')
      .update({ ...patch, updated_at: new Date().toISOString() })
      .eq('id', id)
    if (error) throw error
    await loadTeachers()
  } catch (err) {
    console.error('[teachers] update failed', err)
    alert("Couldn't update teacher — please try again.")
  }
}
</script>

</body>
</html>
