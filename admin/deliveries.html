<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deliveries — Signature Pianos Admin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="admin.css">
<style>
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .photo-grid img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: 4px;
    border: 1px solid var(--admin-border);
  }
</style>
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <span style="font-family:'DM Sans';font-size:13px;font-weight:500;color:#b8935a;letter-spacing:0.1em;">SIGNATURE</span>
      <span style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.15em;display:block;margin-top:2px;">ADMIN</span>
    </div>
    <nav class="admin-nav">
      <a href="dashboard.html"  class="admin-nav-item" data-page="dashboard"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
      <a href="enquiries.html"  class="admin-nav-item" data-page="enquiries"><i class="ti ti-mail"></i> Enquiries <span class="nav-badge" id="enquiriesBadge"></span></a>
      <a href="inventory.html"  class="admin-nav-item" data-page="inventory"><i class="ti ti-piano"></i> Inventory</a>
      <a href="orders.html"     class="admin-nav-item" data-page="orders"><i class="ti ti-receipt"></i> Orders &amp; POS</a>
      <a href="customers.html"  class="admin-nav-item" data-page="customers"><i class="ti ti-users"></i> Customers</a>
      <a href="deliveries.html" class="admin-nav-item" data-page="deliveries"><i class="ti ti-truck-delivery"></i> Deliveries</a>
      <a href="teachers.html"   class="admin-nav-item" data-page="teachers"><i class="ti ti-music"></i> Teachers</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="https://signaturepianos.com.au/" target="_blank" style="font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;display:flex;align-items:center;gap:6px;">
        <i class="ti ti-external-link" style="font-size:13px;"></i> View live site
      </a>
      <button onclick="adminSignOut()" style="font-size:12px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;margin-top:8px;">
        <i class="ti ti-logout" style="font-size:13px;"></i> Sign out
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;">
        <button class="admin-burger" aria-label="Menu"><i class="ti ti-menu-2"></i></button>
        <h1 class="admin-page-title">Deliveries</h1>
      </div>
      <div class="admin-topbar-right">
        <span style="font-size:13px;color:var(--admin-text-muted);" data-admin-name>—</span>
      </div>
    </div>

    <div class="admin-content">

      <div class="stats-strip">
        <div class="stat"><span class="stat-label">Scheduled</span><span class="stat-value" id="statScheduled">—</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-label">In transit</span><span class="stat-value" id="statInTransit">—</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-label">Delivered today</span><span class="stat-value" id="statToday">—</span></div>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Piano</th>
              <th>Scheduled</th>
              <th>Driver</th>
              <th>Status</th>
              <th>Photos</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="deliveriesTableBody">
            <tr><td colspan="7"><div class="empty-state"><i class="ti ti-loader"></i><p>Loading…</p></div></td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<!-- Detail / edit slide-in panel -->
<div class="slide-panel-overlay" id="deliveryPanelOverlay" onclick="closeSlidePanel('deliveryPanel')"></div>
<aside class="slide-panel" id="deliveryPanel" aria-hidden="true">
  <div class="slide-panel-header">
    <h2 class="slide-panel-title" id="deliveryPanelTitle">Delivery</h2>
    <button class="slide-panel-close" onclick="closeSlidePanel('deliveryPanel')" aria-label="Close">&times;</button>
  </div>
  <div class="slide-panel-body" id="deliveryPanelBody"></div>
  <div class="slide-panel-footer">
    <button class="btn-ghost" onclick="closeSlidePanel('deliveryPanel')">Close</button>
    <button class="btn-gold" id="saveDeliveryBtn"><i class="ti ti-device-floppy"></i> Save</button>
  </div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="js/admin-auth.js"></script>
<script src="js/admin-nav.js"></script>
<script>
let allDeliveries = []
let editingId = null

;(async function init() {
  const admin = await checkAdminAuth()
  if (!admin) return
  document.getElementById('saveDeliveryBtn').addEventListener('click', saveDelivery)
  await loadDeliveries()
})()

async function loadDeliveries() {
  try {
    const { data, error } = await adminSupabase
      .from('deliveries')
      .select(`*, orders(order_number, customers(first_name, last_name, email, phone), pianos(brand, model, year))`)
      .order('scheduled_date', { ascending: true, nullsLast: true })
    if (error) throw error
    allDeliveries = data || []
    renderStats()
    renderTable()
  } catch (err) {
    console.error('[deliveries] load failed', err)
    document.getElementById('deliveriesTableBody').innerHTML =
      `<tr><td colspan="7"><div class="empty-state"><i class="ti ti-alert-circle"></i><p>Couldn't load deliveries.</p></div></td></tr>`
  }
}

function renderStats() {
  const c = (s) => allDeliveries.filter(d => d.status === s).length
  const todayStr = new Date().toISOString().slice(0, 10)
  const today = allDeliveries.filter(d =>
    d.status === 'delivered' && d.delivered_at && d.delivered_at.slice(0, 10) === todayStr
  ).length
  document.getElementById('statScheduled').textContent = c('scheduled') + c('pickup_pending')
  document.getElementById('statInTransit').textContent = c('in_transit') + c('picked_up')
  document.getElementById('statToday').textContent     = today
}

function renderTable() {
  const body = document.getElementById('deliveriesTableBody')
  if (!allDeliveries.length) {
    body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="ti ti-truck-off"></i><p>No deliveries yet.</p></div></td></tr>`
    return
  }
  body.innerHTML = allDeliveries.map(d => {
    const cust = d.orders?.customers
      ? `${esc(d.orders.customers.first_name || '')} ${esc(d.orders.customers.last_name || '')}`.trim()
      : '—'
    const piano = d.orders?.pianos
      ? `${esc(d.orders.pianos.brand || '')} ${esc(d.orders.pianos.model || '')}`.trim()
      : '—'
    const photoCount = (d.pickup_photos?.length || 0) + (d.delivery_photos?.length || 0)
    return `
      <tr class="clickable" data-id="${esc(d.id)}">
        <td class="name-cell">${cust}</td>
        <td>${piano}</td>
        <td>${fmtDate(d.scheduled_date)}<br><span style="font-size:11px;color:var(--admin-text-faint);">${esc(d.scheduled_time_window || '')}</span></td>
        <td>${esc(d.driver_name || '—')}</td>
        <td><span class="${statusPillClass(d.status)}">${esc((d.status || '').replace(/_/g,' '))}</span></td>
        <td>${photoCount ? `<i class="ti ti-photo" style="color:var(--admin-gold);"></i> ${photoCount}` : '<span style="color:var(--admin-text-faint);">—</span>'}</td>
        <td>
          <div class="actions-cell">
            <button class="icon-btn" data-action="view"><i class="ti ti-eye"></i></button>
          </div>
        </td>
      </tr>
    `
  }).join('')

  body.querySelectorAll('tr.clickable').forEach(tr => {
    tr.addEventListener('click', () => openDelivery(tr.dataset.id))
  })
}

function openDelivery(id) {
  const d = allDeliveries.find(x => x.id === id)
  if (!d) return
  editingId = id

  const cust = d.orders?.customers
  const piano = d.orders?.pianos
  document.getElementById('deliveryPanelTitle').textContent =
    cust ? `${cust.first_name || ''} ${cust.last_name || ''}`.trim() : 'Delivery'

  const pickupUrl = `${window.location.origin}/delivery/${d.pickup_link_token}`
  const deliveryUrl = `${window.location.origin}/delivery/${d.delivery_link_token}`

  document.getElementById('deliveryPanelBody').innerHTML = `
    <div class="admin-form-row--split">
      <div><div class="admin-label">Order</div><div>${esc(d.orders?.order_number || '—')}</div></div>
      <div><div class="admin-label">Piano</div><div>${piano ? `${esc(piano.brand || '')} ${esc(piano.model || '')}` : '—'}</div></div>
    </div>
    <div class="admin-form-row--split">
      <div>
        <label class="admin-label" for="dlv-driver-name">Driver name</label>
        <input type="text" id="dlv-driver-name" class="admin-input" value="${esc(d.driver_name || '')}">
      </div>
      <div>
        <label class="admin-label" for="dlv-driver-phone">Driver phone</label>
        <input type="tel" id="dlv-driver-phone" class="admin-input" value="${esc(d.driver_phone || '')}">
      </div>
    </div>
    <div class="admin-form-row--split">
      <div>
        <label class="admin-label" for="dlv-date">Scheduled date</label>
        <input type="date" id="dlv-date" class="admin-input" value="${esc(d.scheduled_date || '')}">
      </div>
      <div>
        <label class="admin-label" for="dlv-window">Time window</label>
        <input type="text" id="dlv-window" class="admin-input" placeholder="e.g. 9am–11am" value="${esc(d.scheduled_time_window || '')}">
      </div>
    </div>
    <div class="admin-form-row">
      <label class="admin-label" for="dlv-status">Status</label>
      <select id="dlv-status" class="admin-select">
        ${['scheduled','pickup_pending','picked_up','in_transit','delivered','failed'].map(s =>
          `<option value="${s}"${d.status === s ? ' selected' : ''}>${s.replace(/_/g,' ')}</option>`
        ).join('')}
      </select>
    </div>
    <div class="admin-form-row" style="border-top:1px solid var(--admin-border);padding-top:14px;">
      <div class="admin-label">Driver links</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
        <button class="btn-ghost" type="button" id="copyPickupBtn"><i class="ti ti-link"></i> Copy pickup link</button>
        <button class="btn-ghost" type="button" id="copyDeliveryBtn"><i class="ti ti-link"></i> Copy delivery link</button>
      </div>
      <div id="copyConfirm" style="font-size:11px;color:var(--admin-green);margin-top:6px;display:none;">Copied to clipboard.</div>
    </div>
    ${(d.pickup_photos?.length || d.delivery_photos?.length) ? `
      <h3 style="font-size:13px;font-weight:500;color:var(--admin-text);margin:24px 0 4px;">Pickup photos</h3>
      <div class="photo-grid">
        ${(d.pickup_photos || []).map(u => `<img src="${esc(u)}" alt="Pickup">`).join('') || '<span style="font-size:12px;color:var(--admin-text-faint);">None yet</span>'}
      </div>
      <h3 style="font-size:13px;font-weight:500;color:var(--admin-text);margin:24px 0 4px;">Delivery photos</h3>
      <div class="photo-grid">
        ${(d.delivery_photos || []).map(u => `<img src="${esc(u)}" alt="Delivery">`).join('') || '<span style="font-size:12px;color:var(--admin-text-faint);">None yet</span>'}
      </div>
    ` : ''}
  `

  document.getElementById('copyPickupBtn').addEventListener('click', () => copyToClipboard(pickupUrl))
  document.getElementById('copyDeliveryBtn').addEventListener('click', () => copyToClipboard(deliveryUrl))

  openSlidePanel('deliveryPanel')
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text)
    const c = document.getElementById('copyConfirm')
    c.style.display = 'block'
    setTimeout(() => c.style.display = 'none', 1500)
  } catch (err) {
    console.error('[deliveries] clipboard failed', err)
    prompt('Copy this link:', text)
  }
}

async function saveDelivery() {
  if (!editingId) return
  const payload = {
    driver_name:           document.getElementById('dlv-driver-name').value.trim() || null,
    driver_phone:          document.getElementById('dlv-driver-phone').value.trim() || null,
    scheduled_date:        document.getElementById('dlv-date').value || null,
    scheduled_time_window: document.getElementById('dlv-window').value.trim() || null,
    status:                document.getElementById('dlv-status').value,
    updated_at:            new Date().toISOString(),
  }
  const btn = document.getElementById('saveDeliveryBtn')
  btn.disabled = true; btn.textContent = 'Saving…'
  try {
    const { error } = await adminSupabase.from('deliveries').update(payload).eq('id', editingId)
    if (error) throw error
    closeSlidePanel('deliveryPanel')
    await loadDeliveries()
  } catch (err) {
    console.error('[deliveries] save failed', err)
    alert("Couldn't save delivery — please try again.")
  } finally {
    btn.disabled = false
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save'
  }
}
</script>

</body>
</html>
